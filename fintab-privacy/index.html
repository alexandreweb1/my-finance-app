<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fintab — Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 24px;
    }
    h1 { font-size: 2rem; font-weight: 800; color: #1565C0; }
    p { color: #555; font-size: 0.95rem; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    a.card {
      display: block;
      background: white;
      border: 1px solid #e3eafc;
      border-radius: 16px;
      padding: 24px 36px;
      text-decoration: none;
      color: #1565C0;
      font-weight: 600;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(21,101,192,0.08);
      transition: box-shadow 0.2s;
    }
    a.card:hover { box-shadow: 0 4px 16px rgba(21,101,192,0.18); }
  </style>
</head>
<body>
  <h1>Fintab</h1>
  <p>Controle Financeiro Pessoal</p>
  <div class="links">
    <a class="card" href="privacy.html">📄 Política de Privacidade</a>
    <a class="card" href="terms.html">📋 Termos de Uso</a>
  </div>
</body>
</html>
